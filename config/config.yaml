# Spark Practice Hub Configuration

# Spark Configuration Profiles
spark_profiles:
  Laptop:
    master: "local[*]"
    driver_memory: "1g"
    executor_memory: "1g"
    executor_cores: 1
    shuffle_partitions: 2
    adaptive_query_execution: true
    broadcast_threshold: 10485760  # 10MB
    serializer: "org.apache.spark.serializer.KryoSerializer"
    default_parallelism: 2

  Interview:
    master: "local[2]"
    driver_memory: "2g"
    executor_memory: "2g"
    executor_cores: 2
    shuffle_partitions: 4
    adaptive_query_execution: true
    broadcast_threshold: 10485760  # 10MB
    serializer: "org.apache.spark.serializer.KryoSerializer"
    default_parallelism: 4

  Large_Dataset:
    master: "local[*]"
    driver_memory: "4g"
    executor_memory: "4g"
    executor_cores: 4
    shuffle_partitions: 10
    adaptive_query_execution: true
    broadcast_threshold: 20971520  # 20MB
    serializer: "org.apache.spark.serializer.KryoSerializer"
    default_parallelism: 8

# General App Settings
app_settings:
  database_path: "database/spark_practice.db"
  default_profile: "Interview"
  problems_dir: "problems"
  datasets_dir: "datasets"
  solutions_dir: "solutions"
  exports_dir: "exports"
